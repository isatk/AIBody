# 灵枢配置文件
# 复制此文件为 config.yaml 并修改相应配置

app:
  name: "灵枢"
  version: "1.0.0"
  env: "development"  # development / production

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "localhost"
  port: 3306
  username: "lingxu"
  password: "LingxuDB2024!"
  name: "lingxu"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

minio:
  endpoint: "localhost:9000"
  access_key: "lingxu"
  secret_key: "LingxuMinio2024!"
  bucket: "lingxu"
  use_ssl: false

jwt:
  secret: "your-jwt-secret-key-change-in-production"
  access_token_expire: 900   # 15分钟
  refresh_token_expire: 604800  # 7天

openclaw:
  host: "localhost"
  port: 3000
  api_key: ""

ai:
  providers:
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4-turbo-preview"
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-opus-20240229"
    google:
      api_key: "${GOOGLE_API_KEY}"
      model: "gemini-pro"

vector:
  dimension: 1536
  provider: "sqlite-vec"  # sqlite-vec / chroma / pinecone
  top_k: 5
  threshold: 0.75

task:
  default_timeout: 300  # 5分钟
  max_concurrent_per_user: 10
  queue_size: 1000

websocket:
  ping_interval: 30
  pong_timeout: 10
  max_message_size: 10485760  # 10MB

logging:
  level: "info"  # debug / info / warn / error
  format: "json"
