<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIBody</title>
<style>
/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #24292f; background: #fff; }

/* Header */
.header-top { display: flex; align-items: center; height: 57px; padding: 0 24px; border-bottom: 1px solid #d0d7de; background: #fff; }
.header-left { display: flex; align-items: center; gap: 8px; }
.github-logo { width: 32px; height: 32px; }
.repo-link { font-weight: 600; color: #24292f; text-decoration: none; font-size: 16px; }
.repo-link:hover { color: #0969da; }
.separator { color: #57606a; }
.repo-name { font-weight: 600; color: #24292f; text-decoration: none; }
.repo-name:hover { color: #0969da; }
.header-search { flex: 1; max-width: 272px; margin-left: 16px; }
.header-search input { width: 100%; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 5px 12px; font-size: 14px; }
.header-search input:focus { outline: none; border-color: #0969da; }
.header-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
.header-right svg { width: 20px; height: 20px; color: #57606a; cursor: pointer; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: #d0d7de; }

/* Tabs */
.tabs { display: flex; padding: 0 24px; border-bottom: 1px solid #d0d7de; background: #fff; }
.tab { padding: 12px 16px; font-size: 14px; font-weight: 500; color: #57606a; text-decoration: none; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 6px; }
.tab:hover { color: #24292f; text-decoration: none; }
.tab.active { color: #24292f; border-bottom-color: #f9826c; }
.tab svg { width: 16px; height: 16px; }

/* Main Layout */
.layout { display: flex; }
.sidebar { width: 272px; flex-shrink: 0; border-right: 1px solid #d0d7de; background: #f6f8fa; min-height: calc(100vh - 58px); display: flex; flex-direction: column; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid #d0d7de; display: flex; align-items: center; justify-content: space-between; background: #f6f8fa; position: sticky; top: 0; z-index: 10; }
.sidebar-title { font-size: 14px; font-weight: 600; color: #24292f; }
.branch-btn { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 12px; background: #fff; cursor: pointer; color: #24292f; }
.branch-btn:hover { background: #f3f4f6; }

/* File Tree */
.file-tree { padding: 8px 0; flex: 1; overflow-y: auto; }
.tree-item { display: flex; align-items: center; padding: 6px 12px; cursor: pointer; font-size: 13px; color: #24292f; gap: 4px; }
.tree-item:hover { background: #eaeef2; }
.tree-item.active { background: #b6d5f5; }
.tree-toggle { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; color: #57606a; transition: transform 0.1s; }
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle.hidden { visibility: hidden; }
.tree-icon { width: 16px; height: 16px; flex-shrink: 0; margin-right: 6px; }
.tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-children { padding-left: 20px; display: none; }
.tree-children.open { display: block; }

/* Clone */
.clone-box { padding: 12px 16px; border-top: 1px solid #d0d7de; background: #f6f8fa; }
.clone-label { font-size: 12px; color: #57606a; margin-bottom: 8px; font-weight: 600; }
.clone-input { width: 100%; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: monospace; color: #24292f; }

/* Main Content */
.main { flex: 1; min-width: 0; }

/* File Header */
.file-header { padding: 16px 24px; border-bottom: 1px solid #d0d7de; }
.file-path { font-size: 20px; font-weight: 600; color: #24292f; margin-bottom: 8px; }
.commit-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #57606a; }
.commit-info a { color: #0969da; text-decoration: none; }
.commit-info a:hover { text-decoration: underline; }

/* Toolbar */
.toolbar { display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid #d0d7de; }
.tool-btn { padding: 8px 16px; font-size: 14px; color: #57606a; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; }
.tool-btn:hover { color: #24292f; }
.tool-btn.active { color: #24292f; border-bottom-color: #f9826c; font-weight: 500; }
.toolbar-right { margin-left: auto; display: flex; gap: 4px; }
.tool-btn-right { padding: 6px 8px; border: 1px solid #d0d7de; border-radius: 6px; background: #fff; cursor: pointer; margin: 6px 0 6px 4px; }
.tool-btn-right:hover { background: #f3f4f6; }
.tool-btn-right svg { width: 16px; height: 16px; color: #57606a; }

/* Markdown Content - GitHub Style */
.markdown-body { padding: 32px; max-width: 900px; font-size: 16px; line-height: 1.6; color: #24292f; }
.markdown-body h1 { font-size: 28px; font-weight: 600; padding-bottom: 8px; margin: 0 0 16px; border-bottom: 1px solid #d0d7de; }
.markdown-body h2 { font-size: 22px; font-weight: 600; padding-bottom: 6px; margin: 24px 0 12px; border-bottom: 1px solid #d0d7de; }
.markdown-body h3 { font-size: 18px; font-weight: 600; margin: 20px 0 10px; }
.markdown-body h4 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
.markdown-body p { margin: 12px 0; }
.markdown-body a { color: #0969da; text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body strong { font-weight: 600; }
.markdown-body code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 6px; font-size: 85%; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
.markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; line-height: 1.45; }
.markdown-body pre code { background: none; padding: 0; font-size: 85%; }
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 12px 0; }
.markdown-body li { margin: 4px 0; }
.markdown-body li + li { margin-top: 4px; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.markdown-body th { background: #f6f8fa; padding: 8px 12px; border: 1px solid #d0d7de; text-align: left; font-weight: 600; font-size: 14px; }
.markdown-body td { padding: 8px 12px; border: 1px solid #d0d7de; font-size: 14px; }
.markdown-body tr:nth-child(even) { background: #f6f8fa; }
.markdown-body blockquote { border-left: 4px solid #d0d7de; padding-left: 16px; color: #57606a; margin: 12px 0; font-style: italic; }
.markdown-body hr { border: none; border-top: 1px solid #d0d7de; margin: 24px 0; }
.markdown-body img { max-width: 100%; height: auto; }

/* Code Block */
.code-block { background: #0d1117; border-radius: 6px; margin: 12px 0; overflow: hidden; }
.code-block .code-header { background: #161b22; padding: 8px 16px; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; font-family: monospace; }
.code-block pre { background: #0d1117; padding: 16px; margin: 0; overflow-x: auto; }
.code-block code { color: #c9d1d9; font-size: 13px; line-height: 1.6; }

/* Blank State */
.blank { padding: 80px 24px; text-align: center; color: #57606a; }
.blank svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
.blank h3 { font-size: 18px; font-weight: 600; color: #24292f; margin-bottom: 8px; }

@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>

<script>
// State
var currentFile = '';
var expanded = {};
var manifest = null;

// Load manifest
var xhr = new XMLHttpRequest();
xhr.open('GET', 'manifest.json');
xhr.onload = function() {
  manifest = JSON.parse(xhr.responseText);
  renderTree();
};
xhr.send();

function getIcon(type) {
  if (type === 'dir') {
    return '<svg class="tree-icon" viewBox="0 0 16 16" fill="#54aeff"><path d="M1.75 1A1.75 1.75 0 000 2.75v10.5A1.75 1.75 0 001.75 15h12.5a1.75 1.75 0 001.75-1.75V2.75A1.75 1.75 0 0014.25 1H1.75zm1.75.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>';
  }
  return '<svg class="tree-icon" viewBox="0 0 16 16" fill="#0969da"><path d="M3.75 1.5a.25.25 0 00-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25V6h-2.75A1.75 1.75 0 019 4.25V1.5H3.75zm-1.5.25a.25.25 0 01.25-.25h6.5a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75h-6.5a.75.75 0 01-.75-.75V1.75z"/></svg>';
}

function buildTree() {
  var tree = {};
  tree[''] = [];
  
  manifest.flat.forEach(function(f) {
    var parts = f.path.split('/');
    var name = parts[parts.length - 1];
    var dir = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
    
    if (!tree[dir]) tree[dir] = [];
    
    var exists = tree[dir].some(function(item) { return item.name === name; });
    if (!exists) {
      tree[dir].push({ name: name, path: f.path, type: f.type });
    }
    
    if (f.type === 'dir' && !tree[f.path]) {
      tree[f.path] = [];
    }
  });
  
  return tree;
}

function renderTree() {
  if (!manifest) return;
  
  var tree = buildTree();
  var html = renderNode('', tree);
  document.getElementById('fileTree').innerHTML = html;
}

function renderNode(dir, tree) {
  var children = tree[dir] || [];
  
  children.sort(function(a, b) {
    if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  
  var html = '';
  children.forEach(function(item) {
    var isDir = item.type === 'dir';
    var isOpen = expanded[item.path];
    var isActive = currentFile === item.path;
    
    html += '<div class="tree-item' + (isActive ? ' active' : '') + '" data-path="' + item.path + '">';
    
    var toggleClass = isDir ? (isOpen ? 'open' : '') : 'hidden';
    html += '<span class="tree-toggle ' + toggleClass + '" onclick="event.stopPropagation();toggleDir(\'' + item.path + '\')">▸</span>';
    html += getIcon(item.type);
    html += '<span class="tree-name" onclick="clickItem(\'' + item.path + '\', ' + isDir + ')">' + item.name + '</span>';
    html += '</div>';
    
    if (isDir && tree[item.path]) {
      html += '<div class="tree-children' + (isOpen ? ' open' : '') + '" id="children-' + item.path.replace(/\//g, '_') + '">';
      html += renderNode(item.path, tree);
      html += '</div>';
    }
  });
  
  return html;
}

function toggleDir(path) {
  if (expanded[path]) {
    delete expanded[path];
  } else {
    expanded[path] = true;
  }
  renderTree();
}

function clickItem(path, isDir) {
  if (isDir) {
    toggleDir(path);
  } else {
    showFile(path);
  }
}

function showFile(path) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', path);
  xhr.onload = function() {
    if (xhr.status === 200) {
      currentFile = path;
      var name = path.split('/').pop();
      var ext = name.split('.').pop().toLowerCase();
      var isMd = ['md','markdown','mdown','mkd'].indexOf(ext) >= 0;
      var isScript = ['js','ts','py','sh','bat'].indexOf(ext) >= 0;

      var html = '<div class="file-header">';
      html += '<div class="file-path">' + escapeHtml(name) + '</div>';
      html += '<div class="commit-info">';
      html += '<span><a href="#">opencode</a> committed 9 hours ago</span>';
      html += '</div></div>';

      html += '<div class="toolbar">';
      html += '<button class="tool-btn active">';
      html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zM1 1.75v12.5c0 .069.056.125.125.125h12.5c.069 0 .125-.056.125-.125V1.75c0-.069-.056-.125-.125-.125H1.25c-.069 0-.125.056-.125.125z"/></svg>';
      html += ' Preview</button>';
      html += '<button class="tool-btn">';
      html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.75C4 .784 4.784 0 5.75 0h5.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v8.586A1.75 1.75 0 0114.25 15h-9a1.75 1.75 0 01-1.75-1.75v-1h.75c.69 0 1.25-.56 1.25-1.25V5.75a.25.25 0 00-.25-.25h-2.5a.25.25 0 00-.25.25v.75c0 .69.56 1.25 1.25 1.25h.75v1z"/></svg>';
      html += ' Code</button>';
      html += '<div class="toolbar-right">';
      html += '<button class="tool-btn-right" title="Raw" onclick="window.open(\'' + path + '\')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zM1 1.75v12.5c0 .069.056.125.125.125h12.5c.069 0 .125-.056.125-.125V1.75c0-.069-.056-.125-.125-.125H1.25c-.069 0-.125.056-.125.125z"/></svg></button>';
      html += '<button class="tool-btn-right" title="Download" onclick="window.location=\'' + path + '\'"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 2A1.5 1.5 0 002 3.5v9A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5v-9A1.5 1.5 0 0012.5 2h-9zm3.28 1.47a.75.75 0 010 1.06L5.56 6h6.19a.75.75 0 010 1.5H5.56l1.22 1.53a.75.75 0 11-1.14.94L3.18 7.94a.75.75 0 010-1.06l2.36-2.91z"/></svg></button>';
      html += '</div></div>';

      if (isMd) {
        html += '<div class="markdown-body">' + parseMd(xhr.responseText) + '</div>';
      } else if (isScript) {
        html += '<div class="code-block"><div class="code-header">' + escapeHtml(name) + '</div><pre><code>' + escapeHtml(xhr.responseText) + '</code></pre></div>';
      } else {
        html += '<div class="code-block"><div class="code-header">' + escapeHtml(name) + '</div><pre><code>' + escapeHtml(xhr.responseText) + '</code></pre></div>';
      }

      document.getElementById('content').innerHTML = html;
      
      // Auto-expand parent dirs
      var parts = path.split('/');
      for (var i = 1; i < parts.length; i++) {
        expanded[parts.slice(0, i).join('/')] = true;
      }
      renderTree();
      history.pushState({file:path}, '', '?p=' + encodeURIComponent(path));
    }
  };
  xhr.send();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseMd(md) {
  // Remove front matter
  md = md.replace(/^---[\s\S]*?---\n/, '');
  
  // Headers
  md = md.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  
  // Bold/Italic
  md = md.replace(/\*\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
  md = md.replace(/_(.+?)_/g, '<em>$1</em>');
  
  // Inline code
  md = md.replace(/``([^`]+)``/g, '<code>$1</code>');
  md = md.replace(/`([^`]+)`/g, '<code>$1</code>');
  
  // Links
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  
  // Horizontal rule
  md = md.replace(/^---$/gm, '<hr>');
  
  // Blockquote
  md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  
  // Code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<div class="code-block"><div class="code-header">' + lang + '</div><pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre></div>';
  });
  
  // Tables - match table with separator and body
  md = md.replace(/(\|.+\|\s*\n)\|(?:[-:]+\|)+\s*\n((?:\|.+\|\s*\n?)*)/g, function(match, headerLine, body) {
    var html = '<table>';
    // Header
    var headerCells = headerLine.trim().split('|').filter(function(c) { return c.trim(); });
    html += '<thead><tr>';
    headerCells.forEach(function(h) { 
      html += '<th>' + h.trim() + '</th>'; 
    });
    html += '</tr></thead>';
    // Body
    html += '<tbody>';
    var rows = body.trim().split('\n');
    rows.forEach(function(row) {
      row = row.trim();
      if (!row) return;
      var cells = row.split('|').filter(function(c) { return c.trim(); });
      html += '<tr>';
      cells.forEach(function(c) { 
        html += '<td>' + c.trim() + '</td>'; 
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  });
  
  // Unordered lists
  md = md.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  md = md.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  
  // Ordered lists
  md = md.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  
  // Paragraphs
  var lines = md.split('\n');
  var result = [];
  var inPre = false;
  var inBlockquote = false;
  
  lines.forEach(function(line) {
    if (line.startsWith('<div class="code-block') || line.startsWith('<pre>')) inPre = true;
    if (line.startsWith('</div>') || line.startsWith('</pre>')) inPre = false;
    
    if (!inPre && line.trim() && !line.startsWith('<') && !line.startsWith('#') && !line.match(/^\|/)) {
      result.push('<p>' + line + '</p>');
    } else {
      result.push(line);
    }
  });
  
  return result.join('\n');
}

// URL handling
function init() {
  var params = new URLSearchParams(window.location.search);
  var p = params.get('p');
  if (p) showFile(decodeURIComponent(p));
}

window.onpopstate = function(e) {
  if (e.state && e.state.file) {
    currentFile = e.state.file;
    showFile(e.state.file);
  }
};

// Wait for manifest then init
function waitForManifest() {
  if (manifest) {
    init();
  } else {
    setTimeout(waitForManifest, 100);
  }
}
waitForManifest();
</script>
