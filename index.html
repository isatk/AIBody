<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵枢 — AIBody</title>
<style>
:root {
  --bg: #0d1117; --sidebar-bg: #161b22; --border: #21262d;
  --text: #e6edf3; --text-muted: #7d8590; --link: #58a6ff;
  --folder: #54aeff; --header-bg: #161b22;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
.header { height: 56px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 100; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 8px; }
.github-icon { width: 32px; height: 32px; }
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.breadcrumb a { color: var(--link); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { color: var(--text-muted); }
.breadcrumb .current { color: var(--text); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.clone-btn { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); text-decoration: none; font-size: 13px; background: var(--bg); cursor: pointer; }
.clone-btn:hover { background: var(--border); }
.clone-btn svg { width: 14px; height: 14px; }
.lang-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.lang-btn:hover { background: var(--border); color: var(--text); }
.repo-name { font-size: 16px; font-weight: 600; color: var(--text); text-decoration: none; }
.layout { display: flex; max-width: 1280px; margin: 0 auto; }
.sidebar { width: 240px; flex-shrink: 0; padding: 24px 16px 24px 24px; border-right: 1px solid var(--border); position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.sidebar-link { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; color: var(--text-muted); text-decoration: none; font-size: 14px; cursor: pointer; margin-bottom: 2px; }
.sidebar-link:hover, .sidebar-link.active { background: #1c2128; color: var(--text); }
.sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-link .count { margin-left: auto; font-size: 12px; color: var(--text-muted); background: #1c2128; padding: 0 6px; border-radius: 10px; }
.main { flex: 1; min-width: 0; padding: 24px 32px; }
.file-readme { background: var(--header-bg); border: 1px solid var(--border); border-radius: 6px 6px 0 0; padding: 16px 20px; border-bottom: none; }
.file-readme-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.file-readme-title svg { width: 16px; height: 16px; }
.file-readme a { color: var(--link); text-decoration: none; }
.file-readme a:hover { text-decoration: underline; }
.file-list-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--header-bg); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; }
.file-list-header span { font-size: 14px; font-weight: 600; color: var(--text); }
.file-list-header select { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 6px; font-size: 12px; }
.file-list { border: 1px solid var(--border); border-radius: 0 0 6px 6px; overflow: hidden; }
.file-list a { display: flex; align-items: center; padding: 6px 16px; text-decoration: none; border-bottom: 1px solid var(--border); color: var(--text); transition: background 0.1s; }
.file-list a:last-child { border-bottom: none; }
.file-list a:hover { background: #1c2128; }
.file-icon { width: 16px; height: 16px; margin-right: 10px; flex-shrink: 0; }
.file-name { flex: 1; font-size: 14px; }
.file-name.folder { color: var(--folder); }
.file-desc { font-size: 12px; color: var(--text-muted); margin-right: 16px; min-width: 200px; text-align: right; }
.file-commit { font-size: 12px; color: var(--text-muted); min-width: 120px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
@media (max-width: 768px) { .sidebar { display: none; } .file-desc, .file-commit { display: none; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </div>
  <div class="header-right">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <button class="clone-btn" id="cloneBtn" onclick="copyClone()">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h9.586L14.25 2.65V12.5c0 .966.784 1.75 1.75 1.75v1.5C15.216 16 14 14.784 14 13.5V2.65L11.086 0H1.75C.784 0 0 .784 0 1.75v-1.5zM1 2.5v11h11V2.5L9.5 0v1.5h1.25c.414 0 .75.336.75.75v9.25H1v-1.5c0-.414.336-.75.75-.75H1zm12.5.5v1.25c0 .414-.336.75-.75.75H10.5v9.25h1.5V2.5h2.25v1.5H12.5zm.75 2.5h1.25c.966 0 1.75.784 1.75 1.75v6.5H15v-6.5c0-.414.336-.75.75-.75H16v8.75h1.5V4.5c0-.966-.784-1.75-1.75-1.75H15V2.5h1.5v1.25H15v1z"/></svg>
      <span id="cloneBtnText">Clone</span>
    </button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title" id="t-repo">项目</div>
      <a class="sidebar-link active" href="#" onclick="navigateTo('');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8 15.75a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-2.5a.25.25 0 00-.25.25z"/></svg>
        <span id="repo-name">灵枢</span>
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title" id="t-files">文件</div>
      <a class="sidebar-link" href="#" onclick="navigateTo('research/');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V1.75C0 .784.784 0 1.75 0zm1.75.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>
        research
      </a>
      <a class="sidebar-link" href="#" onclick="navigateTo('docs/');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V1.75C0 .784.784 0 1.75 0zm1.75.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>
        docs
      </a>
      <a class="sidebar-link" href="#" onclick="navigateTo('reports/');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V1.75C0 .784.784 0 1.75 0zm1.75.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>
        reports
      </a>
      <a class="sidebar-link" href="#" onclick="navigateTo('ppt/');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V1.75C0 .784.784 0 1.75 0zm1.75.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>
        ppt
      </a>
      <a class="sidebar-link" href="#" onclick="navigateTo('scripts/');return false;">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V1.75a.25.25 0 00-.25-.25H1.75z"/></svg>
        scripts
      </a>
    </div>
  </aside>
  <main class="main">
    <div id="readme-area"></div>
    <div class="file-list-header">
      <span id="file-count">0 files</span>
      <select onchange="sortFiles(this.value)">
        <option value="name">Name</option>
        <option value="modified">Last modified</option>
      </select>
    </div>
    <div class="file-list" id="file-list">Loading...</div>
  </main>
</div>
<script>
var LANG = localStorage.getItem('lang') || 'zh';
var i18n = {
  zh: { repo: '项目', files: '文件', clone: '克隆', copied: '已复制!', files_count: '个文件', no_files: '暂无文件', readme: '自述文件', name: '灵枢' },
  en: { repo: 'Repository', files: 'Files', clone: 'Clone', copied: 'Copied!', files_count: 'files', no_files: 'No files', readme: 'README', name: 'AIBody' }
};

function toggleLang() {
  LANG = LANG === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', LANG);
  location.reload();
}

function applyLang() {
  var t = i18n[LANG];
  document.getElementById('langBtn').textContent = LANG === 'zh' ? 'EN' : '中文';
  document.getElementById('cloneBtnText').textContent = t.clone;
  document.getElementById('t-repo').textContent = t.repo;
  document.getElementById('t-files').textContent = t.files;
  document.getElementById('repo-name').textContent = t.name;
  document.title = t.name + ' — AIBody';
}

function getIcon(name, isDir) {
  if (isDir) return '<svg class="file-icon" viewBox="0 0 16 16" fill="#54aeff"><path d="M1.75 1A1.75 1.75 0 000 2.75v10.5A1.75 1.75 0 001.75 15h12.5a1.75 1.75 0 001.75-1.75V2.75A1.75 1.75 0 0014.25 1H1.75zm1.75.25a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75z"/></svg>';
  var ext = name.split('.').pop().toLowerCase();
  var colors = { md:'#58a6ff', py:'#3572A5', js:'#f1e05a', ts:'#3178c6', json:'#e34c26', html:'#e34c26', css:'#563d7c', yml:'#cb171e', yaml:'#cb171e', toml:'#9c4221', svg:'#a074c4', png:'#a074c4', jpg:'#a074c4', jpeg:'#a074c4', gif:'#a074c4', pdf:'#bd2c00', txt:'#7d8590', pptx:'#bd873a', ppt:'#bd873a', xlsx:'#217346', xls:'#217346', doc:'#295f91', docx:'#295f91', zip:'#6e6e6e', gz:'#6e6e6e', gitignore:'#f1e05a', license:'#ea8a3a' };
  var c = colors[ext] || '#7d8590';
  return '<svg class="file-icon" viewBox="0 0 16 16" fill="'+c+'"><path d="M4.5 2a.5.5 0 01.5.5v11a.5.5 0 01-.5.5h7a.5.5 0 01.5.5v3a.5.5 0 01-.5.5H5.5a.5.5 0 01-.5-.5V2.5a.5.5 0 01.5-.5h-1zM3 3h2.25a.5.5 0 01.5.5V3a.5.5 0 01-.5.5H3a.5.5 0 00-.5.5v9.5a.5.5 0 00.5.5h9.5a.5.5 0 00.5-.5v-2.75a.5.5 0 01.5-.5H14a.5.5 0 01.5.5v9.5a.5.5 0 01-.5.5H3a.5.5 0 01-.5-.5v-9.5a.5.5 0 01.5-.5z"/></svg>';
}

function navigateTo(path) {
  currentPath = path;
  loadDir(path);
  updateBreadcrumb(path);
}

function updateBreadcrumb(path) {
  var bc = document.getElementById('breadcrumb');
  var parts = path.split('/').filter(function(p) { return p; });
  var html = '<a href="#" onclick="navigateTo(\'\');return false;">' + i18n[LANG].name + '</a>';
  var acc = '';
  parts.forEach(function(p, i) {
    acc += p + '/';
    if (i === parts.length - 1) {
      html += '<span>/</span><span class="current">' + p + '</span>';
    } else {
      html += '<span>/</span><a href="#" onclick="navigateTo(\'' + acc + '\');return false;">' + p + '</a>';
    }
  });
  bc.innerHTML = html;
}

function sortFiles(type) {
  if (type === 'name') {
    allFiles.sort(function(a, b) {
      if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  }
  renderFileList();
}

function renderFileList() {
  var el = document.getElementById('file-list');
  var t = i18n[LANG];
  var visible = allFiles.filter(function(f) { return !f.name.startsWith('.'); });
  document.getElementById('file-count').textContent = visible.length + ' ' + t.files_count;
  var html = '';
  visible.forEach(function(f) {
    var isDir = f.type === 'dir';
    var target = isDir ? 'href="#"' : 'href="' + currentPath + encodeURIComponent(f.name) + '" target="_blank"';
    var cls = isDir ? 'folder' : '';
    var size = f.size ? formatSize(f.size) : '';
    var date = f.mtime ? formatDate(f.mtime) : '';
    var onclick = isDir ? 'onclick="navigateTo(\'' + currentPath + f.name + '/\');return false;"' : '';
    html += '<a ' + (isDir ? onclick : target) + '>' +
      getIcon(f.name, isDir) +
      '<span class="file-name ' + cls + '">' + f.name + '</span>' +
      (size ? '<span class="file-desc">' + size + '</span>' : '') +
      (date ? '<span class="file-commit">' + date + '</span>' : '') +
      '</a>';
  });
  el.innerHTML = html || '<div style="padding:24px;color:#7d8590;text-align:center">' + t.no_files + '</div>';
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(LANG === 'zh' ? 'zh-CN' : 'en-US', {year:'numeric',month:'short',day:'numeric'});
}

function loadDir(path) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', path, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      parseDir(xhr.responseText, path);
    }
  };
  xhr.send();
}

function parseDir(html, path) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  var rows = doc.querySelectorAll('tr');
  allFiles = [];
  rows.forEach(function(row) {
    var cells = row.querySelectorAll('td');
    if (cells.length < 3) return;
    var name = cells[1].textContent.trim().replace(/\/$/, '') || cells[1].querySelector('a')?.textContent?.trim() || '';
    if (!name || name === 'Name') return;
    var isDir = cells[1].textContent.trim().endsWith('/') || name.includes('.') === false;
    var size = parseInt(cells[0].textContent.replace(/[^\d]/g,'')) || 0;
    var mtime = cells.length >= 3 ? cells[2]?.textContent?.trim() || '' : '';
    var dateStr = mtime ? new Date(mtime).toISOString() : '';
    allFiles.push({ name: name, type: isDir ? 'dir' : 'file', size: size, mtime: dateStr });
  });
  allFiles.sort(function(a, b) {
    if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  renderFileList();
  if (path === '') loadReadme();
  else document.getElementById('readme-area').innerHTML = '';
}

function loadReadme() {
  var files = ['README.md', 'README_EN.md', 'readme.md'];
  var t = i18n[LANG];
  var found = false;
  function tryNext(i) {
    if (i >= files.length) { document.getElementById('readme-area').innerHTML = ''; return; }
    var xhr = new XMLHttpRequest();
    xhr.open('GET', files[i], true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200 && !found) {
          found = true;
          var md = xhr.responseText;
          md = md.replace(/^### (.+)$/gm, '<h3 style="color:#e6edf3;font-size:15px;margin:14px 0 6px;font-weight:600">$1</h3>');
          md = md.replace(/^## (.+)$/gm, '<h2 style="color:#e6edf3;font-size:18px;margin:18px 0 8px;font-weight:600;border-bottom:1px solid #21262d;padding-bottom:6px">$1</h2>');
          md = md.replace(/^# (.+)$/gm, '<h1 style="color:#e6edf3;font-size:24px;margin:0 0 6px;font-weight:600">$1</h1>');
          md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
          md = md.replace(/`([^`]+)`/g, '<code style="background:#1c2128;padding:2px 6px;border-radius:4px;font-size:13px">$1</code>');
          md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#58a6ff;text-decoration:none">$1</a>');
          md = md.replace(/^\|(.+)$/gm, '$1');
          md = md.replace(/\n\n+/g, '</p><p style="color:#7d8590;margin:8px 0;line-height:1.6">');
          md = md.replace(/\n/g, '<br>');
          document.getElementById('readme-area').innerHTML = '<div class="file-readme"><div class="file-readme-title"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M7.75 0a.75.75 0 01.75.75v8.69l5.47-5.47a.75.75 0 111.06 1.06l-6.22 6.22H15.5a.75.75 0 010 1.5h-7.25a.75.75 0 01-.75-.75V.75A.75.75 0 017.75 0zm-6.5 9.5h7.25a.75.75 0 01.75.75v1.25a.75.75 0 01-.75.75H1.25a.75.75 0 110-1.5v-.75c0-.414.336-.75.75-.75z"/></svg> README.md</div><p style="color:#7d8590;margin:8px 0;line-height:1.6;font-size:14px">' + md + '</p></div>';
        } else if (xhr.status === 404) {
          tryNext(i + 1);
        }
      }
    };
    xhr.send();
  }
  tryNext(0);
}

function copyClone() {
  var url = 'git://192.168.1.69/灵枢-git.git';
  var t = i18n[LANG];
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.getElementById('cloneBtnText');
      btn.textContent = t.copied;
      setTimeout(function() { btn.textContent = t.clone; }, 2000);
    });
  } else {
    prompt('Copy this URL:', url);
  }
}

var currentPath = '';
var allFiles = [];
applyLang();
navigateTo('');
</script>
</body>
</html>
